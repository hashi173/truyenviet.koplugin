<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: linear-gradient(135deg, #f0fff8 0%, #ecfdf5 48%, #f8fffc 100%);
            color: #213547;
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-form {
            width: 100%;
            max-width: 360px;
            padding: 24px;
            border: 1px solid rgba(66, 184, 131, 0.32);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 18px 45px rgba(66, 184, 131, 0.18);
        }

        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #213547;
        }

        .login-form input {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            border: 1px solid #86efac;
            border-radius: 4px;
            font-size: 16px;
            color: #213547;
            background: #f8fffb;
        }

        .login-form input:focus {
            border-color: #42b883;
            box-shadow: 0 0 0 3px rgba(66, 184, 131, 0.18);
            outline: none;
        }

        .login-form button {
            width: 100%;
            height: 44px;
            margin-top: 12px;
            border: 0;
            border-radius: 4px;
            background: #42b883;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .login-form button:hover {
            background: #33a06f;
        }

        .error {
            margin: 0 0 12px;
            color: #dc2626;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <form class="login-form" method="post" action="">
                <label for="access_pass">Mật khẩu</label>
<p>Năm nay là năm bao nhiêu? (Viết số)</p>
        <input placeholder="mật khẩu..." id="access_pass" name="access_pass" type="password" autocomplete="current-password" required>
        <button type="submit">Đăng nhập</button>
    </form>
</body>
</html>
