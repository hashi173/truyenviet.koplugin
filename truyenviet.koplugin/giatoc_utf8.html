      const scrollBtn = document.getElementById('scroll-to-top');
      const SHOW_THRESHOLD = 300;

      function updateScrollBtn() {
        const scrolled = window.scrollY;
        if (scrolled > SHOW_THRESHOLD) {
          scrollBtn?.classList.add('show');
        } else {
          scrollBtn?.classList.remove('show');
        }
      }

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      async function enforceMaintenanceMode() {
        const ua = navigator.userAgent.toLowerCase();
        if (ua.includes('bot') || ua.includes('crawl') || ua.includes('spider') || ua.includes('googlebot') || ua.includes('bingbot') || ua.includes('slurp') || ua.includes('duckduckbot')) return;

        const path = window.location.pathname;
        if (path.startsWith('/api') || path === '/register') return;
        if (path.startsWith('/_astro') || path.startsWith('/assets') || path.startsWith('/favicon')) return;

        try {
          const settingsRes = await fetch('/api/public/settings', {
            credentials: 'same-origin',
            signal: AbortSignal.timeout(5000),
          });
          if (!settingsRes.ok) return;
          const settingsPayload = await settingsRes.json().catch(() => null);
          const maintenanceMode = settingsPayload?.data?.maintenanceMode === true;
          if (!maintenanceMode) return;

          let isAdmin = false;
          const raw = localStorage.getItem('vuongtai-auth-session');
          if (raw) {
            try {
              const session = JSON.parse(raw);
              if (session?.access_token) {
                const meRes = await fetch('/api/auth/me', {
                  method: 'GET',
                  headers: { Authorization: `Bearer ${session.access_token}` },
                  credentials: 'same-origin',
                  signal: AbortSignal.timeout(5000),
                });
                if (meRes.ok) {
                  const mePayload = await meRes.json().catch(() => null);
                  isAdmin = mePayload?.data?.profile?.role === 'admin' || mePayload?.data?.profile?.role === 'master';
                }
              }
            } catch { /* session parse error, ignore */ }
          }

          if (!isAdmin) {
            window.location.replace('/register');
          }
        } catch {
          // Do NOT redirect on fetch/network errors — allow the page to load normally.
          // Only redirect when maintenance mode is confirmed active by the API response.
        }
      }

      window.addEventListener('scroll', updateScrollBtn, { passive: true });
      scrollBtn?.addEventListener('click', scrollToTop);
      updateScrollBtn();
      void enforceMaintenanceMode();
